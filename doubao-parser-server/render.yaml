services:
  - type: web
    name: doubao-parser
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER
        value: "true"
    numInstances: 1
    autoDeploy: true
